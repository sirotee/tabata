<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="white">
<meta name="apple-mobile-web-app-title" content="TABATA">
<title>TABATA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #fff;
    color: #111;
    font-family: 'Noto Sans JP', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100vw;
    height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* LEFT */
  .left {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px;
  }

  .timer-ring {
    position: relative;
    width: min(40vw, 82vh);
    height: min(40vw, 82vh);
  }
  .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }

  .ring-bg { fill: none; stroke: #eee; stroke-width: 15.6; }
  .ring-progress {
    fill: none; stroke-width: 15.6; stroke-linecap: round;
    stroke: #eb3c34;
    stroke-dasharray: 722;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
  }

  .timer-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .time-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(13vw, 26vh);
    line-height: 1;
    color: #111;
  }
  .phase-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(3vw, 5.5vh);
    letter-spacing: 0.3em;
    padding: 3px 14px;
    border-radius: 100px;
    background: #ccc;
    color: #fff;
    transition: background 0.3s;
    margin-top: 4px;
  }

  /* RIGHT */
  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 10px 16px 10px 8px;
  }

  .round-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(4.8vw, 8.4vh);
    letter-spacing: 0.2em;
    color: #aaa;
  }

  .dots { display: flex; gap: 10px; }
  .dot {
    width: min(2.5vw, 4.5vh);
    height: min(2.5vw, 4.5vh);
    border-radius: 50%;
    background: #e0e0e0;
    transition: background 0.3s;
  }
  .dot.done { background: #30d158; }
  .dot.active { background: #30d158; }
  .dot.active-work {
    background: #eb3c34;
    animation: blink 0.6s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px #eb3c3488; }
    50% { opacity: 0.2; box-shadow: none; }
  }

  .btn-start {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(5.5vw, 10vh);
    letter-spacing: 0.15em;
    padding: min(1.5vh, 14px) min(7vw, 52px);
    border: none; border-radius: 16px;
    background: #eb3c34; color: #fff;
    cursor: pointer;
    transition: background 0.3s, transform 0.1s;
    user-select: none;
  }
  .btn-start:active { transform: scale(0.95); }
  .btn-start.rest { background: #30d158; }
  .btn-start:disabled { opacity: 0.4; }

  .btn-reset {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(3vw, 5.5vh);
    letter-spacing: 0.15em;
    padding: min(1vh, 8px) min(4vw, 28px);
    border: none; border-radius: 12px;
    background: #efefef; color: #888;
    cursor: pointer;
    user-select: none;
  }
  .btn-reset:active { transform: scale(0.95); }

  .ytm-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(2.8vw, 5vh);
    letter-spacing: 0.1em;
    padding: min(1vh, 8px) min(4vw, 24px);
    border: 2px solid #eb3c34;
    border-radius: 12px;
    background: transparent; color: #eb3c34;
    cursor: pointer; text-decoration: none;
    display: inline-block;
    user-select: none;
  }
  .ytm-btn:active { background: #eb3c3411; }

  /* Finish */
  .finish {
    display: none; position: fixed; inset: 0;
    background: #ffffffcc;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; z-index: 10;
  }
  .finish.visible { display: flex; }
  .finish-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(18vw, 30vh); color: #30d158; line-height: 1;
  }
  .finish-sub { font-size: min(3vw, 5vh); color: #888; letter-spacing: 0.15em; }
</style>
</head>
<body>

<div class="app">
  <div class="left">
    <div class="timer-ring">
      <svg viewBox="0 0 260 260">
        <circle class="ring-bg" cx="130" cy="130" r="115"/>
        <circle class="ring-progress" id="ring" cx="130" cy="130" r="115"/>
      </svg>
      <div class="timer-center">
        <div class="time-num" id="timeNum">20</div>
        <div class="phase-badge" id="phaseBadge">READY</div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="round-label" id="roundLabel">ROUND 1 / 8</div>
    <div class="dots" id="dots"></div>
    <button class="btn-start" id="startBtn" onclick="toggleTimer()">START</button>
    <button class="btn-reset" onclick="resetTimer()">RESET</button>
    <a class="ytm-btn" href="youtubemusic://">▶ YouTube Music</a>
  </div>
</div>

<div class="finish" id="finish">
  <div class="finish-title">DONE 🔥</div>
  <div class="finish-sub">8 ROUNDS COMPLETE</div>
  <button class="btn-reset" style="margin-top:16px;font-size:1rem;padding:12px 32px;" onclick="resetTimer()">もう一度</button>
</div>

<script>
const WORK = 20, REST = 10, ROUNDS = 8;
const CIRC = 2 * Math.PI * 115;

let round = 1, isWork = true, timeLeft = WORK;
let running = false, finished = false, interval = null;

const ring = document.getElementById('ring');
const timeNum = document.getElementById('timeNum');
const phaseBadge = document.getElementById('phaseBadge');
const roundLabel = document.getElementById('roundLabel');
const startBtn = document.getElementById('startBtn');
const dotsEl = document.getElementById('dots');

ring.style.strokeDasharray = CIRC;

// Audio
let actx;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function beep(freq, dur, vol=1.0) {
  const c = getCtx();
  // 3本重ねて音量底上げ、周波数を2000-4000Hz帯にシフト
  [freq * 2, freq * 2 + 15, freq * 2 - 15].forEach(f => {
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = Math.min(Math.max(f, 2000), 4000);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  });
}

function buildDots() {
  dotsEl.innerHTML = '';
  for (let i = 1; i <= ROUNDS; i++) {
    const d = document.createElement('div');
    if (i < round) {
      d.className = 'dot done';
    } else if (i === round) {
      d.className = isWork ? 'dot active-work' : 'dot active';
    } else {
      d.className = 'dot';
    }
    dotsEl.appendChild(d);
  }
}

function render() {
  const total = isWork ? WORK : REST;
  ring.style.strokeDashoffset = CIRC * (1 - timeLeft / total);
  const color = isWork ? '#eb3c34' : '#30d158';
  ring.style.stroke = color;
  phaseBadge.style.background = color;
  phaseBadge.textContent = isWork ? 'WORK' : 'REST';
  timeNum.textContent = timeLeft;
  roundLabel.textContent = `ROUND ${round} / ${ROUNDS}`;
  startBtn.className = 'btn-start' + (isWork ? '' : ' rest');
  buildDots();
}

function tick() {
  if (timeLeft <= 3 && timeLeft > 0) beep(550, 0.1, 1.0);
  if (timeLeft === 0) {
    if (isWork) {
      isWork = false; timeLeft = REST;
      beep(660, 0.2, 1.0); setTimeout(() => beep(440, 0.3, 1.0), 200);
    } else {
      if (round >= ROUNDS) {
        clearInterval(interval); running = false; finished = true;
        [880,1100,1320].forEach((f,i) => setTimeout(() => beep(f, 0.3, 1.0), i*180));
        document.getElementById('finish').className = 'finish visible';
        return;
      }
      round++; isWork = true; timeLeft = WORK; beep(880, 0.15, 1.0);
    }
  } else { timeLeft--; }
  render();
}

function toggleTimer() {
  if (finished) return;
  getCtx();
  if (running) {
    clearInterval(interval); running = false;
    startBtn.textContent = 'RESUME';
  } else {
    running = true;
    startBtn.textContent = 'PAUSE';
    beep(880, 0.15, 1.0);
    render();
    interval = setInterval(tick, 1000);
  }
}

function resetTimer() {
  clearInterval(interval);
  running = false; finished = false;
  round = 1; isWork = true; timeLeft = WORK;
  startBtn.textContent = 'START';
  startBtn.disabled = false;
  document.getElementById('finish').className = 'finish';
  phaseBadge.textContent = 'READY';
  phaseBadge.style.background = '#ccc';
  ring.style.strokeDashoffset = 0;
  ring.style.stroke = '#eb3c34';
  roundLabel.textContent = `ROUND 1 / ${ROUNDS}`;
  timeNum.textContent = WORK;
  buildDots();
}

buildDots();
</script>
</body>
</html>
